version: "3"

env:
  STATIC_DIR: "static"

tasks:
  # The `build:` tasks below are used together for "production" builds of your project
  build:templ:
    cmds:
      - go tool templ generate -v

  build:styles:
    cmds:
      - go tool gotailwind -i input.css -o $STATIC_DIR/output.css --minify

  build:
    cmds:
      - go build -o counter .
    deps:
      - build:styles
      - build:templ

  # Use this task to debug your project with the delve debugger
  debug:
    cmds:
      - go tool dlv exec ./counter
    deps:
      - build

  # The `live:` tasks below are used together for "dev" builds, and will hot-reload your entire project when there are code changes
  live:templ:
    cmds:
      - go tool templ generate --watch --proxy="http://localhost:8080" --proxybind="localhost" --cmd="go run ."

  live:styles:
    cmds:
      - go tool gotailwind -i input.css -o $STATIC_DIR/output.css --watch

  live:
    deps:
      - live:templ
      - live:styles

  run:
    cmds:
      - ./counter
    deps:
      - build
